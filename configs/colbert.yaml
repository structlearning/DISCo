k: 5
colbert_topk: 100
method: "internal" # baseline, rerank, augmented, internal

data:
  dataset_name: "nfcorpus"  #scifact, hotpotqa
  loader_type: "beir"

augment: False 
dbl_norm: True  # [:,:,-1]=0 -> normalization -> [:,:,-1] = -1 
num_rh_augment: 8
rh_num : -1
threshold: 1
generate_new_rh: False
# RH_file: "experimemts/temp"

parallelization: "thread" # "proc" or "thread" or "none"

save_intermediate: False # save all index/scores at intermediate steps
save_full_embs: False # save full (uncompressed) embeddings for all queries/documents

index: False
overwrite_index: False # False, True, 'reuse', 'resume', "force_silent_overwrite"


colbert:
  nbits: 2 
  save_full_embs: False #TODO: remove redundancy 
  normalize_q : True # Normalise augmented queries before sending over to colbert

# only valid for colbert_internal
colbert_internal:
  rerank_internal: True ## rerank on the colbert score
  rerank_external: True ## rerank by us on the external score



embedder:
  mode: "mem"
  type: 'BERT'
  mv_type: "colbertv2-plaid" # "colbertv2-base", "colbertv2-plaid", "xtr-base"
  emb_dim: 128
  query_batch_size: null


retriever:
  type: "colbert"
  num_batches: -1 # historical reasons