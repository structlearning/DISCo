k: 15
colbert_topk: 100
method: "baseline" # baseline, rerank, augmented

data:
  dataset_name: "hotpotqa"  #scifact, hotpotqa
  loader_type: "beir"

augment: False 
dbl_norm: True  # [:,:,-1]=0 -> normalization -> [:,:,-1] = -1 
num_rh_augment: 8
rh_num : -1
threshold: 1
generate_new_rh: True
# RH_file: "experimemts/temp"

parallelization: "thread" # "proc" or "thread" or "none"

save_intermediate: False # save all index/scores at intermediate steps
save_full_embs: True # save full embeddings for all queries/documents

index: True
overwrite_index: False # False, True, 'reuse', 'resume', "force_silent_overwrite"


colbert:
  nbits: 2 
  save_full_embs: False #TODO: remove redundancy 



embedder:
  mode: "mem"
  type: 'BERT'
  mv_type: "colbertv2-plaid" # "colbertv2-base", "colbertv2-plaid", "xtr-base"
  emb_dim: 128
  query_batch_size: null


retriever:
  type: "colbert"
  num_batches: -1 # historical reasons